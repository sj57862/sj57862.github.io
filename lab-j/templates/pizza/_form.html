<form action="{{ url_for('pizza.edit_post') if pizza and pizza.id else url_for('pizza.create_post') }}" method="post">

  <div class="row g-3">

    <div class="col-12">
      <label for="name" class="form-label">Pizza name</label>
      <input
        type="text"
        id="name"
        name="name"
        value="{{ pizza.name if pizza and pizza.name else '' }}"
        class="form-control"
        maxlength="255"
        required
      >
    </div>

    <div class="col-md-4 col-12">
      <label for="price" class="form-label">Price</label>

      <div class="input-group">
        <input
          type="number"
          id="price"
          name="price"
          value="{{ pizza.price if pizza and pizza.price is not none else '' }}"
          class="form-control"
          step="0.01"
          min="0"
          required
        >
        <span class="input-group-text">zl</span>
      </div>
    </div>

    <div class="col-12">
      <label for="description" class="form-label">Description</label>

      <textarea
        id="description"
        name="description"
        class="form-control"
        rows="3"
        maxlength="1000"
      >{{ pizza.description if pizza and pizza.description else '' }}</textarea>
    </div>

  </div>

  {% if pizza and pizza.id %}
    <input type="hidden" name="id" value="{{ pizza.id }}">
  {% endif %}

  <div class="mt-3">
    <button class="btn btn-primary">
      {{ buttonLabel if buttonLabel else 'Save' }}
    </button>
  </div>

</form>
