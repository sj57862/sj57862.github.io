<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ title if title else 'New Pizza' }}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="card p-3 rounded-3 bg-white">
  <h1>Pizza</h1>

  <div class="table-responsive rounded-3 overflow-hidden">
    <table class="table mb-0">
      <tbody>
        <tr>
          <th>Id</th>
          <td>{{ pizza.id }}</td>
        </tr>
        <tr>
          <th>Name</th>
          <td>{{ pizza.name }}</td>
        </tr>
        <tr>
          <th>Price</th>
          <td>{{ pizza.price }}</td>
        </tr>
        <tr>
          <th>Description</th>
          <td>{{ pizza.description }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="mt-3">
    <a href="{{ url_for('pizza.index') }}" class="btn btn-secondary btn-sm">back to list</a>
    <a href="{{ url_for('pizza.edit', id=pizza.id) }}" class="btn btn-outline-primary btn-sm ms-2">edit</a>
    {% include "pizza/_delete_form.html" %}
  </div>
</div>
</body>
</html>
