<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ title if title else 'New Pizza' }}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="card p-3 rounded-3 bg-white">
  <div class="d-flex align-items-center mb-3">
    <h1 class="me-auto mb-0">Pizza index</h1>
    <a href="{{ url_for('pizza.create') }}" class="btn btn-primary btn-sm">Create new</a>
  </div>

  <div class="table-responsive rounded-3 overflow-hidden">
    <table class="table table-hover table-striped table-bordered mb-0">
      <thead>
        <tr>
          <th>Id</th>
          <th>Name</th>
          <th>Price</th>
          <th>Description</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
          {% for pizza in pizzas %}
            <tr>
              <td>{{ pizza.id }}</td>
              <td>{{ pizza.name }}</td>
              <td>{{ pizza.price }}</td>
              <td>{{ pizza.description }}</td>
              <td>
                <a href="{{ url_for('pizza.show', id=pizza.id) }}" class="btn btn-outline-info btn-sm me-1">
                  show
                </a>
                <a href="{{ url_for('pizza.edit', id=pizza.id) }}" class="btn btn-outline-warning btn-sm">
                  edit
                </a>
              </td>
            </tr>
          {% endfor %}

      </tbody>

    </table>
  </div>
</div>
</body>
</html>
